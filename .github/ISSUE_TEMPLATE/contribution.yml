name: Contribution Interest
description: Tell us how you would like to contribute to InnerSource Commons Africa
title: "[Contribution]: "
labels:
  - contribution
assignees:
  - reginankenchor

body:
  - type: markdown
    attributes:
      value: |
        Thank you for your interest in **InnerSource Commons Africa** 🎉

        This form helps you share how you would like to contribute to the community.
        Once submitted, a maintainer will follow up with you on next steps.

  - type: dropdown
    id: contribution_area
    attributes:
      label: What area would you like to contribute to?
      description: Select the option that best matches how you want to participate.
      options:
        - Translation of InnerSource Patterns
        - Story sharing
        - Blog or written content
        - Speaking at a community call
        - Community support or volunteering
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Contribution guidance

        You can use this form for different kinds of contributions.

        Examples:
        - **Translation:** mention the pattern or translation area you are interested in
        - **Story sharing:** describe the experience, lesson, or case study you want to share
        - **Blog or written content:** share your topic or draft idea
        - **Speaking:** share the topic you would like to present during a community call
        - **Community support:** describe how you would like to help with organizing, outreach, or coordination

        👉 If you are interested in translation, you can explore the InnerSource Patterns here:  
        https://github.com/InnerSourceCommons/InnerSourcePatterns

  - type: input
    id: contribution_title
    attributes:
      label: Contribution title or idea
      description: Give a short title for what you would like to contribute.
      placeholder: e.g. Translate Contributor Ladder, share an InnerSource adoption story, speak about lessons learned
    validations:
      required: true

  - type: textarea
    id: contribution_details
    attributes:
      label: More details on where you want to support
      description: Tell us more about the kind of contribution you want to make.
      placeholder: |
        Share any context that will help us support you.

        For example:
        - If this is translation, mention the pattern, language, or translation area you want to work on
        - If this is story sharing, describe the story or experience you want to share
        - If this is blog or written content, tell us the topic or audience
        - If this is speaking, tell us the topic and format you have in mind
        - If this is community support, describe how you would like to help
    validations:
      required: true

  - type: textarea
    id: support_needed
    attributes:
      label: What support would help you get started?
      description: Let us know how the community can support you.
      placeholder: e.g. help choosing a pattern, feedback on an idea, presentation guidance, connecting with others
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Before submitting
      options:
        - label: I understand that a maintainer will follow up with me about next steps.
          required: true
          
