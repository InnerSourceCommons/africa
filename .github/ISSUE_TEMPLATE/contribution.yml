name: Contribution Interest
description: Tell us how you would like to contribute to InnerSource Commons Africa
title: "[Contribution]: "
labels:
  - contribution
assignees:
  - reginankenchor

body:
  - type: markdown
    attributes:
      value: |
        Thank you for your interest in **InnerSource Commons Africa** 🎉

        This form helps you tell us how you would like to contribute to the community.
        Once submitted, a maintainer will follow up with you on next steps.

  - type: dropdown
    id: contribution_area
    attributes:
      label: What area would you like to contribute to?
      description: Select the option that best matches how you want to participate.
      options:
        - Translation of InnerSource Patterns
        - Story sharing
        - Blog or written content
        - Speaking at a community call
        - Community support or volunteering
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Contribution Areas

        Depending on your selection above:

        - **Translation:** Help translate InnerSource Patterns into African languages  
        - **Story sharing:** Share experiences or lessons from your work  
        - **Blog/content:** Write about InnerSource topics relevant to Africa  
        - **Speaking:** Present at a community call  
        - **Community support:** Help with organizing and outreach  

        A maintainer will guide you based on your selected contribution area.

        👉 You can explore InnerSource Patterns here:  
        https://github.com/InnerSourceCommons/InnerSourcePatterns

  - type: input
    id: language
    attributes:
      label: Language (if applicable)
      description: If this is a translation contribution, which language would you like to work in?
      placeholder: e.g. Swahili, Yoruba, Hausa, Amharic, Zulu
    validations:
      required: false

  - type: input
    id: topic_or_pattern
    attributes:
      label: Topic, pattern, or contribution idea
      description: Tell us what you want to work on, present, or share.
      placeholder: e.g. Translate Contributor Ladder, share an InnerSource story, give a short talk
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional details
      description: Share any extra context that would help us support you.
      placeholder: Tell us more about your idea or contribution.
    validations:
      required: false

  - type: textarea
    id: support_needed
    attributes:
      label: What support would help you get started?
      description: Let us know how the community can support you.
      placeholder: e.g. help choosing a pattern, feedback on an idea, presentation guidance
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Before submitting
      options:
        - label: I understand that a maintainer will follow up with me about next steps.
          required: true
